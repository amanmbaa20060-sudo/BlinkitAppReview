# Render Blueprint for BlinkitAppReview
# Sync this file from the Render Dashboard or connect the repo as a Blueprint.

services:
  # Static dashboard — recommended for phase5/ (no port binding needed).
  - type: web
    name: blinkit-dashboard
    runtime: static
    buildCommand: python phase5/scripts/build_dashboard_data.py
    staticPublishPath: phase5
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # Weekly pipeline: ingest -> theme -> insights -> validate -> dashboard bundle.
  - type: cron
    name: blinkit-pipeline
    runtime: python
    plan: free
    schedule: "0 6 * * 1"
    buildCommand: pip install -r requirements.txt
    startCommand: python scripts/run_pipeline.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: RUN_ID
        value: 2026-07-16-weekly
      - key: GROQ_API_KEY
        sync: false
