# Phase 4 governance thresholds (Phase 0 QA decision)

publish:
  min_confidence: 0.60
  min_evidence_count: 1
  min_source_diversity: 2
  require_faithfulness_pass: true
  require_not_insufficient_evidence: true

coverage:
  min_theme_coverage_pct: 70.0

sampling_qa:
  sample_size: 25
  min_precision: 0.70
  use_llm_judge: true

faithfulness:
  use_llm_judge: true
  min_pass_rate: 0.80

cross_source:
  single_source_penalty: 0.15
  min_sources_for_full_weight: 2

stability:
  holdout_fraction: 0.30
  min_top_theme_overlap: 0.60
  top_k: 10

stakeholder_spotcheck:
  # Placeholder acceptance for v1 automated run; replace after human review
  status: pending_human_review
  auto_note: "Automated pipeline ready for stakeholder spot-check of published insights."
